<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bounty Board IM023</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080a0c;
      --panel: #0d1117;
      --panel2: #111820;
      --border: rgba(255,180,50,0.12);
      --border-bright: rgba(255,180,50,0.4);
      --gold: #ffb432;
      --gold-dim: #c87d10;
      --gold-bright: #ffd060;
      --red: #ff3c3c;
      --red-dim: #c02020;
      --green: #00e87a;
      --green-dim: #009950;
      --cyan: #00d4ff;
      --muted: #556070;
      --text: #d4dde8;
      --text-bright: #eef4ff;
      --glow-gold: 0 0 18px rgba(255,180,50,0.35);
      --glow-red: 0 0 18px rgba(255,60,60,0.35);
      --glow-green: 0 0 18px rgba(0,232,122,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,180,50,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,180,50,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 1260px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .hdr-title { display: flex; align-items: center; gap: 14px; }
    .skull-icon { font-size: 36px; filter: drop-shadow(0 0 10px var(--gold)); }
    .title-main {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--gold-bright);
      text-shadow: 0 0 24px rgba(255,180,50,0.6), 0 0 60px rgba(255,180,50,0.2);
      line-height: 1;
    }
    .title-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 0.18em;
      color: var(--muted); margin-top: 3px;
    }
    .lang-wrap { display: flex; align-items: center; gap: 10px; }
    .lang-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .lang-select {
      background: var(--panel2); color: var(--gold);
      border: 1px solid var(--border-bright); border-radius: 6px;
      padding: 6px 14px; font-family: 'Exo 2', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; outline: none;
    }
    .lang-select option { background: #1a2233; color: var(--text); }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }
    .panel {
      background: linear-gradient(160deg, var(--panel2) 0%, var(--panel) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 22px 18px;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .panel-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-title .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); box-shadow: var(--glow-gold);
      flex-shrink: 0;
    }
    .panel-title .dot.red { background: var(--red); box-shadow: var(--glow-red); }
    .panel-title .dot.green { background: var(--green); box-shadow: var(--glow-green); }
    .hunter-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .hunter-btn {
      background: linear-gradient(180deg, rgba(0,232,122,0.1), rgba(0,232,122,0.04));
      border: 1px solid rgba(0,232,122,0.22);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--green);
      cursor: pointer;
      transition: all .15s ease;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      min-width: 110px;
    }
    .hunter-btn:hover {
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(0,232,122,0.2);
      transform: translateY(-2px);
    }
    .hunter-btn.active {
      border-color: var(--green);
      background: linear-gradient(180deg, rgba(0,232,122,0.22), rgba(0,232,122,0.08));
      box-shadow: 0 0 20px rgba(0,232,122,0.3);
    }
    .hunter-btn .h-price {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: rgba(0,232,122,0.6);
    }
    .hunter-btn .h-count {
      position: absolute; top: 4px; right: 6px;
      font-size: 10px; font-weight: 700;
      color: var(--gold); font-family: 'Share Tech Mono', monospace;
    }
    .hunter-btn .h-count:empty { display: none; }
    .add-hunter-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .gh-input {
      flex: 1; min-width: 100px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px; color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .gh-input:focus { border-color: var(--gold-dim); }
    .gh-input::placeholder { color: var(--muted); }
    .gh-input.price { max-width: 120px; }
    .add-btn {
      background: linear-gradient(180deg, rgba(255,180,50,0.2), rgba(255,180,50,0.08));
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.05em;
      color: var(--gold); cursor: pointer;
      transition: all .15s;
    }
    .add-btn:hover { background: rgba(255,180,50,0.25); box-shadow: var(--glow-gold); }
    .bonus-sections { display: flex; flex-direction: column; gap: 14px; }
    .bonus-sec-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 0.15em;
      color: var(--cyan); margin-bottom: 8px;
      text-transform: uppercase;
    }
    .bonus-checks { display: flex; flex-wrap: wrap; gap: 6px; }
    .cb-label {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px; font-weight: 600;
      transition: all .15s;
      user-select: none;
    }
    .cb-label:hover { border-color: rgba(255,180,50,0.3); }
    .cb-label input[type=checkbox] { accent-color: var(--gold); width: 14px; height: 14px; cursor: pointer; }
    .cb-label.checked {
      border-color: var(--gold-dim);
      background: rgba(255,180,50,0.1);
      color: var(--gold-bright);
    }
    .cb-val { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--gold-dim); }
    .clan-rows { display: flex; flex-direction: column; gap: 8px; }
    .clan-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .clan-btn {
      background: linear-gradient(180deg, rgba(255,60,60,0.12), rgba(255,60,60,0.04));
      border: 1px solid rgba(255,60,60,0.22);
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--red); cursor: pointer;
      transition: all .15s;
      min-width: 130px;
    }
    .clan-btn:hover { border-color: var(--red); box-shadow: var(--glow-red); }
    .clan-btn.active { border-color: var(--red); background: rgba(255,60,60,0.18); }
    .ps-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      padding: 8px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; color: var(--text);
      cursor: pointer; transition: all .15s;
    }
    .ps-btn:hover { border-color: var(--red); color: var(--red); }
    .ps-btn.active { border-color: var(--red); color: var(--red); background: rgba(255,60,60,0.1); box-shadow: var(--glow-red); }
    .summary-panel { grid-column: span 2; }
    @media (max-width: 860px) { .summary-panel { grid-column: span 1; } }
    .summary-list {
      min-height: 80px; max-height: 360px;
      overflow-y: auto;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .summary-list::-webkit-scrollbar { width: 4px; }
    .summary-list::-webkit-scrollbar-track { background: transparent; }
    .summary-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    .sum-empty {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; color: var(--muted);
      text-align: center; padding: 20px 0;
    }
    .sum-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 8px; border-radius: 6px;
      margin-bottom: 4px;
      border: 1px solid transparent;
      transition: background .1s;
      gap: 8px;
    }
    .sum-item:hover { background: rgba(255,255,255,0.03); }
    .sum-item .si-left { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .sum-item .si-name { font-weight: 600; font-size: 14px; color: var(--text-bright); }
    .sum-item .si-detail { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); }
    .sum-item .si-val { font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: 700; color: var(--green); flex-shrink: 0; }
    .sum-item.clan .si-val { color: var(--red); }
    .totals-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .total-box {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .total-box .tb-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 6px;
    }
    .total-box .tb-val { font-family: 'Share Tech Mono', monospace; font-size: 20px; font-weight: 700; }
    .total-box.box-total .tb-val { color: var(--gold-bright); text-shadow: 0 0 14px rgba(255,208,96,0.5); }
    .total-box.box-tax .tb-val { color: var(--red); }
    .total-box.box-net .tb-val { color: var(--green); text-shadow: 0 0 14px rgba(0,232,122,0.4); }
    .example-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .example-box .ex-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 0.14em;
      color: var(--cyan); text-transform: uppercase;
      margin-bottom: 8px;
    }
    .example-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; line-height: 1.7;
      color: rgba(212,221,232,0.85);
      white-space: pre-wrap; word-break: break-word;
    }
    .example-text .hi-name { color: var(--green); }
    .example-text .hi-clan { color: var(--red); }
    .example-text .hi-total { color: var(--gold-bright); font-weight: 700; }
    .action-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .act-btn {
      padding: 11px 20px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
      cursor: pointer; border: 1px solid; transition: all .15s;
    }
    .act-btn.undo { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: var(--text); }
    .act-btn.undo:hover { background: rgba(255,255,255,0.1); }
    .act-btn.clear { background: transparent; border-color: rgba(255,60,60,0.3); color: var(--red); }
    .act-btn.clear:hover { background: rgba(255,60,60,0.1); }
    .act-btn.copy {
      background: linear-gradient(135deg, #c87d10, #ffb432);
      border-color: var(--gold); color: #000;
      box-shadow: 0 4px 18px rgba(255,180,50,0.3);
      min-width: 160px;
    }
    .act-btn.copy:hover { box-shadow: 0 4px 28px rgba(255,180,50,0.5); transform: translateY(-1px); }
    @keyframes flash-gold { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 30px rgba(255,180,50,0.6)} }
    .flash { animation: flash-gold .4s ease; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--gold); color: #000;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.05em;
      padding: 12px 28px; border-radius: 40px;
      opacity: 0; pointer-events: none;
      transition: all .3s ease; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .remove-btn {
      background: transparent; border: none;
      color: var(--muted); font-size: 12px; cursor: pointer;
      margin-left: 2px; line-height: 1;
      transition: color .1s;
    }
    .remove-btn:hover { color: var(--red); }
    .sec-div { height: 1px; background: var(--border); margin: 14px 0; }
    .bonus-tags {
      display: flex; flex-wrap: wrap; gap: 3px;
    }
    .bonus-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; padding: 1px 5px;
      background: rgba(255,180,50,0.12);
      border: 1px solid rgba(255,180,50,0.3);
      border-radius: 3px; color: var(--gold-dim);
    }
    /* Delete row button in summary */
    .del-entry-btn {
      background: transparent; border: none;
      color: var(--muted); font-size: 14px; cursor: pointer;
      padding: 2px 5px; border-radius: 4px;
      transition: color .1s, background .1s;
      flex-shrink: 0;
    }
    .del-entry-btn:hover { color: var(--red); background: rgba(255,60,60,0.1); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-title">
      <span class="skull-icon">💀</span>
      <div>
        <div class="title-main" id="titleText">BOUNTY BOARD IM023</div>
        <div class="title-sub" id="titleSub">WANTED · DEAD OR ALIVE · TAX 30%</div>
      </div>
    </div>
    <div class="lang-wrap">
      <span class="lang-label">Lang</span>
      <select id="langSelect" class="lang-select">
        <option value="en">English</option>
        <option value="th">ไทย</option>
      </select>
    </div>
  </div>

  <div class="main-grid">
    <!-- LEFT: Hunter names -->
    <div class="panel">
      <div class="panel-title"><span class="dot green"></span><span id="hunterHeader">HUNTER TARGETS</span></div>
      <div class="hunter-grid" id="hunterGrid"></div>
      <div class="sec-div"></div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;" id="addHunterLabel">ADD CUSTOM TARGET</div>
      <div class="add-hunter-row">
        <input class="gh-input" id="newHunterName" placeholder="Name" />
        <input class="gh-input price" id="newHunterPrice" placeholder="Price (M)" type="number" min="0.5" step="0.5" />
        <button class="add-btn" id="addHunterBtn">＋ ADD</button>
      </div>
    </div>

    <!-- RIGHT: Bonus checkboxes -->
    <div class="panel">
      <div class="panel-title"><span class="dot"></span><span id="bonusHeader">BONUS MODIFIERS</span></div>
      <div class="bonus-sections" id="bonusSections">
        <div class="bonus-section">
          <div class="bonus-sec-title">SP</div>
          <div class="bonus-checks">
            <label class="cb-label" id="cb-RB-label">
              <input type="checkbox" id="cb-RB" data-val="3000000" data-label="[RB]" />
              <span>[RB]</span><span class="cb-val">+3M</span>
            </label>
            <label class="cb-label" id="cb-YB-label">
              <input type="checkbox" id="cb-YB" data-val="2000000" data-label="[YB]" />
              <span>[YB]</span><span class="cb-val">+2M</span>
            </label>
            <label class="cb-label" id="cb-GB-label">
              <input type="checkbox" id="cb-GB" data-val="2000000" data-label="[GB]" />
              <span>[GB]</span><span class="cb-val">+2M</span>
            </label>
          </div>
        </div>
        <div class="bonus-section">
          <div class="bonus-sec-title">MS</div>
          <div class="bonus-checks">
            <label class="cb-label" id="cb-LC12-label">
              <input type="checkbox" id="cb-LC12" data-val="2000000" data-label="[LC 1-2]" />
              <span>[LC 1-2]</span><span class="cb-val">+2M</span>
            </label>
            <label class="cb-label" id="cb-LC3-label">
              <input type="checkbox" id="cb-LC3" data-val="3000000" data-label="[LC3]" />
              <span>[LC3]</span><span class="cb-val">+3M</span>
            </label>
          </div>
        </div>
        <div class="bonus-section">
          <div class="bonus-sec-title">WB</div>
          <div class="bonus-checks">
            <label class="cb-label" id="cb-WB-label">
              <input type="checkbox" id="cb-WB" data-val="3000000" data-label="[WB]" />
              <span>[WB]</span><span class="cb-val">+3M</span>
            </label>
            <label class="cb-label" id="cb-PGT-label">
              <input type="checkbox" id="cb-PGT" data-val="3000000" data-label="[PGT]" />
              <span>[PGT]</span><span class="cb-val">+3M</span>
            </label>
          </div>
        </div>
      </div>

      <div class="sec-div"></div>
      <div class="panel-title" style="margin-bottom:12px;"><span class="dot red"></span><span id="clanHeader">DS BY CLAN</span></div>
      <div class="clan-rows" id="clanRows">
        <div class="clan-row">
          <button class="clan-btn" data-family="Usdt丶Stellar">Usdt丶Stellar</button>
          <button class="ps-btn" data-ps="250000" data-family="Usdt丶Stellar">250k</button>
          <button class="ps-btn" data-ps="280000" data-family="Usdt丶Stellar">280k</button>
          <button class="ps-btn" data-ps="300000" data-family="Usdt丶Stellar">300k+</button>
        </div>
        <div class="clan-row">
          <button class="clan-btn" data-family="Pïmlückぷ">Pïmlückぷ</button>
          <button class="ps-btn" data-ps="250000" data-family="Pïmlückぷ">250k</button>
          <button class="ps-btn" data-ps="280000" data-family="Pïmlückぷ">280k</button>
          <button class="ps-btn" data-ps="300000" data-family="Pïmlückぷ">300k+</button>
        </div>
        <div class="clan-row">
          <button class="clan-btn" data-family="Usdt丶Syahdu">Usdt丶Syahdu</button>
          <button class="ps-btn" data-ps="250000" data-family="Usdt丶Syahdu">250k</button>
          <button class="ps-btn" data-ps="280000" data-family="Usdt丶Syahdu">280k</button>
          <button class="ps-btn" data-ps="300000" data-family="Usdt丶Syahdu">300k+</button>
        </div>
      </div>
    </div>

    <!-- BOTTOM: Summary -->
    <div class="panel summary-panel">
      <div class="panel-title"><span class="dot"></span><span id="summaryTitle">BOUNTY SUMMARY</span></div>
      <div class="summary-list" id="summaryList">
        <div class="sum-empty" id="sumEmpty">— No targets recorded —</div>
      </div>
      <div class="totals-row">
        <div class="total-box box-total">
          <div class="tb-label" id="labelTotal">TOTAL BOUNTY</div>
          <div class="tb-val" id="sumAll">0</div>
        </div>
        <div class="total-box box-tax">
          <div class="tb-label" id="labelTax">TAX 30%</div>
          <div class="tb-val" id="tax30">0</div>
        </div>
        <div class="total-box box-net">
          <div class="tb-label" id="labelNet">AFTER TAX</div>
          <div class="tb-val" id="netRemain">0</div>
        </div>
      </div>
      <div class="example-box" id="exampleBox" style="display:none">
        <div class="ex-title" id="exTitle">📋 COPY PREVIEW</div>
        <div class="example-text" id="exampleText"></div>
      </div>
      <div class="action-row">
        <button class="act-btn undo" id="undoBtn">↩ <span id="undoLabel">UNDO</span></button>
        <div style="display:flex;gap:8px">
          <button class="act-btn clear" id="clearBtn"><span id="clearLabel">CLEAR ALL</span></button>
          <button class="act-btn copy" id="copyBtn">📋 <span id="copyLabel">COPY SUMMARY</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){

  const STORAGE_KEY = 'bountyBoard_customHunters';

  const DEFAULT_HUNTERS = [
    { name: 'xBenedettta',  price: 2000000, editable: false },
    { name: 'Sweet potato', price: 2000000, editable: false },
    { name: '忠Gen',         price: 2000000, editable: false },
    { name: 'Estelle Rae',  price: 2000000, editable: false },
    { name: 'SHyeSun',      price: 1000000, editable: false },
    { name: 'ATOWN01',      price: 1000000, editable: false },
    { name: 'Nneon024',     price: 1000000, editable: false },
  ];

  const psToDs = { 250000: 100000, 280000: 200000, 300000: 500000 };
  const BONUS_IDS = ['cb-RB','cb-YB','cb-GB','cb-LC12','cb-LC3','cb-WB','cb-PGT'];

  function loadCustomHunters() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      return JSON.parse(raw).map(h => ({ ...h, editable: true }));
    } catch(e) { return []; }
  }

  function saveCustomHunters() {
    try {
      const custom = hunters.filter(h => h.editable);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(custom));
    } catch(e) {}
  }

  let hunters = [
    ...DEFAULT_HUNTERS.map(h => ({...h})),
    ...loadCustomHunters()
  ];

  let entries = [];
  let history = [];
  let nextId = 1;

  function newId() { return nextId++; }

  /* ─── ACTIVE BONUSES SNAPSHOT ─── */
  function getActiveBonuses() {
    return BONUS_IDS
      .filter(id => {
        const cb = document.getElementById(id);
        return cb && cb.checked;
      })
      .map(id => {
        const cb = document.getElementById(id);
        return { key: id, label: cb.dataset.label, val: parseInt(cb.dataset.val) };
      });
  }

  /* ─── TEXTS ─── */
  const T = {
    en: {
      titleSub: 'WANTED · DEAD OR ALIVE · TAX 30%',
      hunterHeader: 'HUNTER TARGETS',
      bonusHeader: 'BONUS MODIFIERS',
      clanHeader: 'DS BY CLAN',
      summaryTitle: 'BOUNTY SUMMARY',
      labelTotal: 'TOTAL BOUNTY',
      labelTax: 'TAX 30%',
      labelNet: 'AFTER TAX',
      undoLabel: 'UNDO',
      clearLabel: 'CLEAR ALL',
      copyLabel: 'COPY SUMMARY',
      addHunterLabel: 'ADD CUSTOM TARGET',
      exTitle: '📋 COPY PREVIEW',
      sumEmpty: '— No targets recorded —',
      namePH: 'Name',
      pricePH: 'Price (M)',
      addBtn: '＋ ADD',
      toastCopied: '✓ Copied to clipboard',
      toastNoEntry: 'No entries to copy',
      confirmClear: 'Clear all bounty entries?',
      totalShort: 'total',
    },
    th: {
      titleSub: 'ตั้งค่าหัว · หักภาษี 30%',
      hunterHeader: 'เป้าหมาย',
      bonusHeader: 'โบนัสเพิ่มเติม',
      clanHeader: 'DS ตามตระกูล',
      summaryTitle: 'สรุปค่าหัว',
      labelTotal: 'รวมทั้งหมด',
      labelTax: 'ภาษี 30%',
      labelNet: 'เหลือหลังหักภาษี',
      undoLabel: 'ย้อนกลับ',
      clearLabel: 'ล้างทั้งหมด',
      copyLabel: 'คัดลอก',
      addHunterLabel: 'เพิ่มเป้าหมายใหม่',
      exTitle: '📋 ตัวอย่างข้อความที่จะคัดลอก',
      sumEmpty: '— ยังไม่มีรายการ —',
      namePH: 'ชื่อ',
      pricePH: 'ราคา (M)',
      addBtn: '＋ เพิ่ม',
      toastCopied: '✓ คัดลอกแล้ว',
      toastNoEntry: 'ยังไม่มีรายการ',
      confirmClear: 'ล้างรายการทั้งหมด?',
      totalShort: 'รวม',
    }
  };

  let lang = 'en';
  const t = () => T[lang];

  /* ─── HELPERS ─── */
  function fmt(n) { return new Intl.NumberFormat('en-US').format(n); }
  function fmtShort(n) {
    if(n >= 1e6){ const m = n/1e6; return (Number.isInteger(m)?m:m.toFixed(1).replace(/\.0$/,''))+'M'; }
    if(n >= 1e3){ const k = n/1e3; return (Number.isInteger(k)?k:k.toFixed(1).replace(/\.0$/,''))+'K'; }
    return String(n);
  }

  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2000);
  }

  function entryValue(e) {
    if(e.type === 'person') {
      const bonusSum = (e.bonuses||[]).reduce((s,b)=>s+b.val, 0);
      return e.unit + bonusSum;
    }
    return e.unit;
  }

  function bonusKey(bonuses) {
    return (bonuses||[]).map(b=>b.key).sort().join(',');
  }

  function groupPersonEntries(personEntries) {
    const map = new Map();
    personEntries.forEach(e => {
      const key = e.name + '|' + bonusKey(e.bonuses);
      if(map.has(key)) {
        map.get(key).count++;
        map.get(key).ids.push(e.id);
      } else {
        map.set(key, { name: e.name, unit: e.unit, bonuses: e.bonuses, count: 1, ids: [e.id] });
      }
    });
    return Array.from(map.values());
  }

  function groupPsEntries(psEntries) {
    const map = new Map();
    psEntries.forEach(e => {
      const key = e.family + '|' + e.ps;
      if(map.has(key)) {
        map.get(key).count++;
        map.get(key).ids.push(e.id);
      } else {
        map.set(key, { family: e.family, ps: e.ps, unit: e.unit, count: 1, ids: [e.id] });
      }
    });
    return Array.from(map.values());
  }

  /* ─── BUILD HUNTER GRID ─── */
  function buildHunterGrid(){
    const grid = document.getElementById('hunterGrid');
    grid.innerHTML = '';
    hunters.forEach(h => {
      const count = entries.filter(e => e.type==='person' && e.name===h.name).length;

      const btn = document.createElement('button');
      btn.className = 'hunter-btn' + (count > 0 ? ' active' : '');
      btn.dataset.name = h.name;

      btn.innerHTML = `
        <span class="h-count">${count > 0 ? 'x'+count : ''}</span>
        <span>${h.name}${h.editable ? ` <button class="remove-btn" data-remove="${h.name}" title="Remove">✕</button>` : ''}</span>
        <span class="h-price">${fmtShort(h.price)}/kill</span>
      `;
      grid.appendChild(btn);
    });

    grid.querySelectorAll('.hunter-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        if(e.target.classList.contains('remove-btn')) return;
        const name = btn.dataset.name;
        const hunter = hunters.find(h=>h.name===name);
        if(!hunter) return;

        const activeBonuses = getActiveBonuses();
        const id = newId();
        entries.push({ id, type:'person', name, unit: hunter.price, bonuses: activeBonuses });
        history.push(id);

        buildHunterGrid();
        updateSummary();
      });
    });

    grid.querySelectorAll('.remove-btn').forEach(rb => {
      rb.addEventListener('click', e => {
        e.stopPropagation();
        const name = rb.dataset.remove;
        hunters = hunters.filter(h=>h.name!==name);
        entries = entries.filter(e=>!(e.type==='person'&&e.name===name));
        history = history.filter(id => entries.find(e=>e.id===id));
        saveCustomHunters();
        buildHunterGrid();
        updateSummary();
      });
    });
  }

  /* ─── ADD HUNTER ─── */
  document.getElementById('addHunterBtn').addEventListener('click', addHunter);
  document.getElementById('newHunterPrice').addEventListener('keydown', e=>{ if(e.key==='Enter') addHunter(); });

  function addHunter(){
    const nameEl = document.getElementById('newHunterName');
    const priceEl = document.getElementById('newHunterPrice');
    const name = nameEl.value.trim();
    const priceM = parseFloat(priceEl.value);
    if(!name) { nameEl.focus(); return; }
    if(isNaN(priceM) || priceM <= 0) { priceEl.focus(); return; }
    if(hunters.find(h=>h.name===name)) { nameEl.select(); return; }
    hunters.push({ name, price: Math.round(priceM * 1e6), editable: true });
    saveCustomHunters();
    nameEl.value = '';
    priceEl.value = '';
    buildHunterGrid();
  }

  /* ─── CHECKBOXES ─── */
  BONUS_IDS.forEach(id => {
    const cb = document.getElementById(id);
    const lbl = document.getElementById(id+'-label');
    cb.addEventListener('change', () => {
      if(cb.checked) lbl.classList.add('checked');
      else lbl.classList.remove('checked');
    });
  });

  /* ─── CLAN / PS BUTTONS ─── */
  document.querySelectorAll('.ps-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ps = parseInt(btn.dataset.ps);
      const family = btn.dataset.family;
      const ds = psToDs[ps] || 0;

      btn.closest('.clan-row').querySelectorAll('.ps-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');

      const id = newId();
      entries.push({ id, type:'ps', family, ps, unit: ds });
      history.push(id);

      updateSummary();
    });
  });

  /* ─── UNDO ─── */
  document.getElementById('undoBtn').addEventListener('click', () => {
    if(!history.length) return;
    const lastId = history.pop();
    entries = entries.filter(e => e.id !== lastId);
    buildHunterGrid();
    updateSummary();
  });

  /* ─── CLEAR ─── */
  document.getElementById('clearBtn').addEventListener('click', () => {
    if(!entries.length) return;
    if(!confirm(t().confirmClear)) return;
    entries = [];
    history = [];
    BONUS_IDS.forEach(id=>{
      document.getElementById(id).checked = false;
      document.getElementById(id+'-label').classList.remove('checked');
    });
    document.querySelectorAll('.ps-btn').forEach(b=>b.classList.remove('active'));
    buildHunterGrid();
    updateSummary();
  });

  /* ─── COPY TEXT BUILDER ─── */
  function buildCopyText(){
    let lines = [];
    let total = 0;

    const personGroups = groupPersonEntries(entries.filter(e=>e.type==='person'));
    const psGroups = groupPsEntries(entries.filter(e=>e.type==='ps'));

    personGroups.forEach(g => {
      const bonusSum = (g.bonuses||[]).reduce((s,b)=>s+b.val, 0);
      const perKill = g.unit + bonusSum;
      const v = perKill * g.count;
      total += v;

      const bonusPart = (g.bonuses||[]).length > 0
        ? (g.bonuses.map(b=>b.label).join('') + ' ')
        : '';

      // ── แสดงแค่ชื่อ + จำนวน + ยอดรวม ไม่มี breakdown ──
      lines.push(`${bonusPart}${g.name} x${g.count} = ${fmtShort(v)}`);
    });

    psGroups.forEach(g => {
      const v = g.unit * g.count; total += v;
      lines.push(`[PS:${g.ps/1000}k] ${g.family} x${g.count} = ${fmtShort(v)}`);
    });

    lines.push('');
    lines.push(`${t().totalShort} = ${fmtShort(total)}`);
    return lines.join('\n');
  }

  /* ─── COPY BUTTON ─── */
  document.getElementById('copyBtn').addEventListener('click', async () => {
    if(!entries.length){ showToast(t().toastNoEntry); return; }
    const text = buildCopyText();
    try { await navigator.clipboard.writeText(text); }
    catch(e){ prompt('', text); }
    showToast(t().toastCopied);
    document.getElementById('copyBtn').classList.add('flash');
    setTimeout(()=>document.getElementById('copyBtn').classList.remove('flash'),500);
  });

  /* ─── UPDATE SUMMARY UI ─── */
  function updateSummary(){
    const list = document.getElementById('summaryList');
    const exBox = document.getElementById('exampleBox');
    const exText = document.getElementById('exampleText');

    if(!entries.length){
      list.innerHTML = `<div class="sum-empty">${t().sumEmpty}</div>`;
      exBox.style.display = 'none';
      document.getElementById('sumAll').textContent = '0';
      document.getElementById('tax30').textContent = '0';
      document.getElementById('netRemain').textContent = '0';
      return;
    }

    let html = '';
    let total = 0;

    const personGroups = groupPersonEntries(entries.filter(e=>e.type==='person'));
    const psGroups = groupPsEntries(entries.filter(e=>e.type==='ps'));

    personGroups.forEach(g => {
      const bonusSum = (g.bonuses||[]).reduce((s,b)=>s+b.val, 0);
      const perKill = g.unit + bonusSum;
      const v = perKill * g.count;
      total += v;

      const bonusTagsHtml = (g.bonuses||[]).length > 0
        ? `<div class="bonus-tags">${g.bonuses.map(b=>`<span class="bonus-tag">${b.label} +${fmtShort(b.val)}</span>`).join('')}</div>`
        : '';

      const detailText = bonusSum > 0
        ? `×${g.count} @ ${fmtShort(g.unit)} + ${fmtShort(bonusSum)}`
        : `×${g.count} @ ${fmtShort(g.unit)}`;

      html += `<div class="sum-item">
        <div class="si-left">
          <span class="si-name">👤 ${g.name}</span>
          ${bonusTagsHtml}
        </div>
        <span class="si-detail">${detailText}</span>
        <span class="si-val">${fmtShort(v)}</span>
        <button class="del-entry-btn" data-ids="${g.ids.join(',')}" title="Remove one">✕</button>
      </div>`;
    });

    psGroups.forEach(g => {
      const v = g.unit * g.count; total += v;
      html += `<div class="sum-item clan">
        <div class="si-left">
          <span class="si-name">🔴 [PS:${g.ps/1000}k] ${g.family}</span>
        </div>
        <span class="si-detail">×${g.count} @ ${fmtShort(g.unit)}</span>
        <span class="si-val">${fmtShort(v)}</span>
        <button class="del-entry-btn" data-ids="${g.ids.join(',')}" title="Remove one">✕</button>
      </div>`;
    });

    list.innerHTML = html;

    list.querySelectorAll('.del-entry-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const ids = btn.dataset.ids.split(',').map(Number);
        const removeId = ids[ids.length - 1];
        entries = entries.filter(e => e.id !== removeId);
        history = history.filter(id => id !== removeId);
        buildHunterGrid();
        updateSummary();
      });
    });

    const tax = Math.round(total * 0.30);
    const net = total - tax;
    document.getElementById('sumAll').textContent = fmt(total);
    document.getElementById('tax30').textContent = fmt(tax);
    document.getElementById('netRemain').textContent = fmt(net);

    const lines = buildCopyText().split('\n');
    const highlighted = lines.map(line => {
      if(line.includes('丶')||line.includes('ぷ')||line.startsWith('[PS')){
        return `<span class="hi-clan">${line}</span>`;
      }
      if(line.startsWith(t().totalShort)||line.startsWith('total')){
        return `<span class="hi-total">${line}</span>`;
      }
      if(line.trim() !== '') {
        return `<span class="hi-name">${line}</span>`;
      }
      return line;
    });
    exText.innerHTML = highlighted.join('\n');
    exBox.style.display = 'block';
  }

  /* ─── LANGUAGE ─── */
  function applyLang(){
    const tx = t();
    document.getElementById('titleSub').textContent = tx.titleSub;
    document.getElementById('hunterHeader').textContent = tx.hunterHeader;
    document.getElementById('bonusHeader').textContent = tx.bonusHeader;
    document.getElementById('clanHeader').textContent = tx.clanHeader;
    document.getElementById('summaryTitle').textContent = tx.summaryTitle;
    document.getElementById('labelTotal').textContent = tx.labelTotal;
    document.getElementById('labelTax').textContent = tx.labelTax;
    document.getElementById('labelNet').textContent = tx.labelNet;
    document.getElementById('undoLabel').textContent = tx.undoLabel;
    document.getElementById('clearLabel').textContent = tx.clearLabel;
    document.getElementById('copyLabel').textContent = tx.copyLabel;
    document.getElementById('addHunterLabel').textContent = tx.addHunterLabel;
    document.getElementById('exTitle').textContent = tx.exTitle;
    document.getElementById('newHunterName').placeholder = tx.namePH;
    document.getElementById('newHunterPrice').placeholder = tx.pricePH;
    document.getElementById('addHunterBtn').textContent = tx.addBtn;
    updateSummary();
  }

  document.getElementById('langSelect').addEventListener('change', e => {
    lang = e.target.value;
    applyLang();
  });

  /* ─── INIT ─── */
  buildHunterGrid();
  updateSummary();

})();
</script>
</body>
</html>
